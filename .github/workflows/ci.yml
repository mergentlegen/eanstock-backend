name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: leanstock
          POSTGRES_USER: leanstock
          POSTGRES_PASSWORD: leanstock
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leanstock -d leanstock"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://leanstock:leanstock@localhost:5432/leanstock?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_ACCESS_SECRET: ci-access-secret-at-least-32-characters
      JWT_REFRESH_SECRET: ci-refresh-secret-at-least-32-characters
      CORS_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test
      - run: docker build -t leanstock-backend .
